# PostgreSQL StatefulSet for payment-service database

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: payment-postgres
  namespace: payment-postgres
  labels:
    app.kubernetes.io/name: payment-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/version: "16"
spec:
  serviceName: payment-postgres-headless # Harus cocok dengan nama Service headless
  replicas: 1
  selector:
    matchLabels:
      app: payment-postgres
  template:
    metadata:
      labels:
        app: payment-postgres
        app.kubernetes.io/name: payment-postgres
        app.kubernetes.io/component: database
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: fix-permissions
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          command:
            - sh
            - -c
            - |
              echo "==> Fixing ownership on data directory..."
              install -d -o 999 -g 999 -m 0700 /var/lib/postgresql/data/pgdata
              chown -R 999:999 /var/lib/postgresql/data
              chmod 0700 /var/lib/postgresql/data/pgdata

              echo "==> Fixing ownership on runtime directory..."
              install -d -o 999 -g 999 -m 0775 /var/run/postgresql
              chown 999:999 /var/run/postgresql

              echo "==> Permissions fixed."
          volumeMounts:
            - name: payment-postgres-data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: payment-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: payment-postgres-secret
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: payment-postgres-data
              mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
    - metadata:
        name: payment-postgres-data
        labels:
          app.kubernetes.io/name: payment-postgres
          app.kubernetes.io/component: storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        storageClassName: "ceph-rbd-sc"  # Set to your StorageClass (Longhorn / OpenEBS / NFS)
