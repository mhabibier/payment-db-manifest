# PostgreSQL StatefulSet for payment-service.
#
# WHY StatefulSet (not Deployment):
#   - Stable, predictable pod name: payment-postgres-0
#   - Stable network identity via headless service
#   - volumeClaimTemplates provisions a dedicated PVC per pod
#   - Ordered startup/shutdown guarantees data consistency

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: payment-postgres
  namespace: payment-postgres
  labels:
    app.kubernetes.io/name: payment-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/version: "16"
spec:
  serviceName: payment-postgres-headless # Harus cocok dengan nama Service headless
  replicas: 1
  selector:
    matchLabels:
      app: payment-postgres
  template:
    metadata:
      labels:
        app: payment-postgres
        app.kubernetes.io/name: payment-postgres
        app.kubernetes.io/component: database
    spec:
      # ── Security ─────────────────────────────────────────────────────────────
      securityContext:
        runAsUser: 999 # User postgres di dalam official image
        runAsGroup: 999
        fsGroup: 999 # Memastikan volume dapat ditulis oleh user postgres
        runAsNonRoot: true

      terminationGracePeriodSeconds: 60

      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          # ── Credentials from Secret ─────────────────────────────────────────
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: payment-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: payment-postgres-secret
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          # ── Health probes ───────────────────────────────────────────────────
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          # ── Resources ───────────────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ── Volume mount ────────────────────────────────────────────────────
          volumeMounts:
            - name: payment-postgres-data
              mountPath: /var/lib/postgresql/data

  # ── PVC Template ─────────────────────────────────────────────────────────────
  # Nama PVC otomatis: payment-postgres-data-payment-postgres-0
  volumeClaimTemplates:
    - metadata:
        name: payment-postgres-data
        labels:
          app.kubernetes.io/name: payment-postgres
          app.kubernetes.io/component: storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
