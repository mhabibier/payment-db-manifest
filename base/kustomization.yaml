apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace khusus untuk isolasi data payment
namespace: payment-postgres

resources:
  - namespace.yaml
  - secret.yaml
  - configmap.yaml
  - statefulset.yaml
  - service.yaml

# Label otomatis untuk mempermudah monitoring dan seleksi resource
commonLabels:
  app.kubernetes.io/name: payment-postgres
  app.kubernetes.io/managed-by: kustomize
